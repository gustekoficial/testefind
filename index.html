<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Encontre Sua Resposta</title>

    <style>
      body {
        margin: 0;
        font-family: "Georgia", serif;
        background:
          linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.9)),
          url("https://images.unsplash.com/photo-1506126613408-eca07ce68773")
            center/cover;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        max-width: 520px;
        width: 90%;
        background: rgba(0, 0, 0, 0.65);
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
      }

      h1 {
        font-size: 28px;
      }

      .sub {
        font-size: 14px;
        opacity: 0.8;
        margin-bottom: 20px;
      }

      textarea {
        width: 100%;
        border-radius: 12px;
        border: none;
        padding: 12px;
        margin-bottom: 10px;
      }

      button {
        margin-top: 10px;
        padding: 14px;
        width: 100%;
        border-radius: 12px;
        border: none;
        background: linear-gradient(45deg, #f4c542, #ffdd73);
        font-weight: bold;
        cursor: pointer;
        font-size: 16px;
      }

      #resultado {
        margin-top: 20px;
        font-size: 17px;
        line-height: 1.6;
        min-height: 80px;
        text-align: left;
      }

      .testimonials {
        margin-top: 20px;
        text-align: left;
        font-size: 14px;
      }

      .testimonial {
        margin-bottom: 10px;
        border-left: 3px solid #f4c542;
        padding-left: 10px;
      }

      .social-proof {
        margin-top: 15px;
        font-size: 13px;
        color: #ffd966;
      }

      .blur {
        filter: blur(6px);
      }

      .typing {
        animation: blink 1s infinite;
      }

      @keyframes blink {
        50% {
          opacity: 0.5;
        }
      }

      /* 🔥 botão escondido inicialmente */
      #btnReveal {
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Encontre sua resposta</h1>
      <div class="sub">Algo precisa ser revelado para você hoje...</div>

      <textarea
        id="input"
        placeholder="Digite o que você está vivendo..."
      ></textarea>

      <button onclick="gerarResposta()">Encontrar resposta</button>

      <div id="resultado"></div>

      <!-- 🔥 BOTÃO COM DELAY -->
      <button id="btnReveal" onclick="revelar()">Revelação Completa</button>

      <div class="social-proof" id="contador"></div>

      <div class="testimonials">
        <div class="testimonial">“Parecia que era pra mim…”</div>
        <div class="testimonial">“Isso me fez chorar.”</div>
        <div class="testimonial">“Muito preciso, assustador até.”</div>
      </div>
    </div>

    <script>
      // contador
      function atualizarContador() {
        const numero = Math.floor(Math.random() * 80) + 120;
        document.getElementById("contador").innerText =
          `+${numero} pessoas estão encontrando respostas agora`;
      }
      setInterval(atualizarContador, 3000);
      atualizarContador();

      // gerar resposta
      async function gerarResposta() {
        let texto = document.getElementById("input").value;

        texto = texto.slice(0, 300);

        const el = document.getElementById("resultado");

        el.innerHTML = `
    <div class="typing">
      Analisando profundamente sua situação...
    </div>
  `;

        // 🔥 esconder botão até nova resposta
        document.getElementById("btnReveal").style.display = "none";

        try {
          const resposta = await fetch(
            "https://backfind.vercel.app/api/responder",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                mensagem: texto,
              }),
            },
          );

          const data = await resposta.json();

          escreverTexto(data.texto);

          // 🔥 delay para mostrar botão
          setTimeout(() => {
            document.getElementById("btnReveal").style.display = "block";
          }, 3000);
        } catch (err) {
          el.innerHTML = "Erro ao gerar resposta.";
        }
      }

      // efeito de revelação progressiva
      function escreverTexto(texto) {
        const el = document.getElementById("resultado");

        const partes = texto.split(". ");
        const primeiraFrase = partes[0];
        const resto = partes.slice(1).join(". ");

        el.innerHTML = `
    <div style="font-size:20px; font-weight:500; margin-bottom:15px;">
      ${primeiraFrase}.
    </div>

    <div id="resto" class="blur" style="margin-bottom:15px;">
      ${resto}
    </div>
  `;
      }

      // revelar
      function revelar() {
        document.getElementById("resto").classList.remove("blur");
      }
    </script>
  </body>
</html>
