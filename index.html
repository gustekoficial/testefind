<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Encontre Sua Resposta</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:ital,wght@1,400;1,500&display=swap"
      rel="stylesheet"
    />

    <script src="https://sdk.mercadopago.com/js/v2"></script>

    <style>
      :root {
        --accent: #d4af37;
        --success: #2d5a27;
        --text-dark: #2c3e50;
        --text-light: #5a6c7d;
        --bg-panel: rgba(255, 255, 255, 0.94);
      }

      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background:
          linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)),
          url("https://images.unsplash.com/photo-1499346030926-9a72daac6c63?auto=format&fit=crop&q=80&w=2000")
            center/cover fixed;
        color: var(--text-dark);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        box-sizing: border-box;
      }

      .container {
        width: 100%;
        max-width: 380px;
        background: var(--bg-panel);
        padding: 40px 25px;
        border-radius: 32px;
        text-align: center;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(212, 175, 55, 0.1);
      }

      h1 {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 10px;
        color: #1a1a1a;
        letter-spacing: -0.5px;
      }
      .sub {
        font-family: "Lora", serif;
        font-size: 15px;
        color: var(--text-light);
        margin-bottom: 30px;
        font-style: italic;
      }

      textarea {
        width: 100%;
        min-height: 110px;
        border-radius: 20px;
        border: 1px solid #e0e6ed;
        background: #ffffff;
        padding: 18px;
        font-size: 16px;
        margin-bottom: 20px;
        resize: none;
        outline: none;
        box-sizing: border-box;
        transition: 0.3s;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
      }
      textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
      }

      .btn-main {
        background: #1a1a1a;
        color: white;
        padding: 18px;
        width: 100%;
        border-radius: 50px;
        border: none;
        font-weight: 600;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
      }
      .btn-main:hover {
        background: #333;
      }

      #resultado {
        margin-top: 25px;
        text-align: left;
        position: relative;
      }
      .loading-step {
        text-align: center;
        font-size: 14px;
        color: var(--accent);
        font-weight: 600;
        animation: blink 1.5s infinite;
        font-family: "Lora", serif;
        font-style: italic;
      }

      .reveal-box {
        line-height: 1.8;
        font-size: 15px;
        position: relative;
      }
      .text-visible {
        color: var(--text-dark);
      }

      .blur-wrapper {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 0px;
      }

      .blur-text {
        filter: blur(6px);
        user-select: none;
        opacity: 0.35;
        display: block;
        width: 100%;
        mask-image: linear-gradient(to bottom, black 0%, transparent 90%);
        -webkit-mask-image: linear-gradient(
          to bottom,
          black 0%,
          transparent 90%
        );
        transition: 0.5s;
      }

      #btnReveal {
        position: absolute;
        top: 15px;
        z-index: 100;
        background: rgba(255, 255, 255, 0.85);
        color: var(--accent);
        padding: 16px 28px;
        border-radius: 50px;
        border: 1px solid var(--accent);
        font-family: "Lora", serif;
        font-weight: 500;
        font-style: italic;
        font-size: 14px;
        cursor: pointer;
        display: none;
        overflow: hidden;
        white-space: nowrap;
        backdrop-filter: blur(5px);
        box-shadow: 0 8px 20px rgba(212, 175, 55, 0.15);
        transition: 0.3s;
      }

      #btnReveal:hover {
        background: rgba(255, 255, 255, 1);
        box-shadow: 0 10px 25px rgba(212, 175, 55, 0.25);
        transform: translateY(-2px);
      }

      #btnReveal::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -60%;
        width: 20%;
        height: 200%;
        background: rgba(212, 175, 55, 0.2);
        transform: rotate(30deg);
        animation: shine-spiritual 4s infinite;
      }

      @keyframes shine-spiritual {
        0% {
          left: -60%;
          opacity: 0;
        }
        15% {
          opacity: 1;
        }
        30% {
          left: 120%;
          opacity: 0;
        }
        100% {
          left: 120%;
          opacity: 0;
        }
      }

      .no-blur {
        filter: none !important;
        opacity: 1 !important;
        mask-image: none !important;
        -webkit-mask-image: none !important;
        display: inline !important;
      }

      .social-proof {
        margin-top: 30px;
        font-size: 12px;
        color: var(--text-light);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border-top: 1px solid rgba(0, 0, 0, 0.03);
        padding-top: 20px;
      }
      .dot {
        height: 7px;
        width: 7px;
        background: #2ecc71;
        border-radius: 50%;
        display: inline-block;
        box-shadow: 0 0 6px #2ecc71;
        animation: pulse-dot 2.5s infinite;
      }

      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(8px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }
      .modal-content {
        background: white;
        padding: 40px 30px;
        border-radius: 30px;
        width: 90%;
        max-width: 340px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        border: 1px solid rgba(212, 175, 55, 0.1);
      }
      .btn-close {
        position: absolute;
        top: 20px;
        right: 20px;
        background: none;
        border: none;
        font-size: 18px;
        cursor: pointer;
        color: #ccc;
      }

      @keyframes blink {
        50% {
          opacity: 0.5;
        }
      }
      @keyframes pulse-dot {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.8;
        }
        50% {
          transform: scale(1.2);
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Encontre sua resposta</h1>
      <div class="sub">Algo precisa ser revelado para você hoje...</div>

      <textarea
        id="input"
        placeholder="Escreva o que está no seu coração agora..."
      ></textarea>
      <button class="btn-main" id="btnGerar" onclick="gerarResposta()">
        Sintonizar Resposta
      </button>

      <div id="resultado"></div>

      <div class="social-proof">
        <span class="dot"></span>
        <span id="txt-contador">Conectando...</span>
      </div>
    </div>

    <div id="paymentModal" class="modal-overlay">
      <div class="modal-content">
        <button class="btn-close" onclick="fecharModal()">✕</button>
        <div style="font-size: 30px; margin-bottom: 15px; color: var(--accent)">
          ✦
        </div>
        <h2
          style="
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            font-family: &quot;Lora&quot;, serif;
            font-style: italic;
          "
        >
          Sua Jornada Merece Clareza
        </h2>
        <p
          style="
            font-size: 14px;
            color: #5a6c7d;
            margin-bottom: 25px;
            line-height: 1.6;
          "
        >
          A parte final contém o <b>direcionamento exato</b> para você destravar
          essa situação. Não ignore esta mensagem do destino.
        </p>
        <div
          style="
            background: rgba(212, 175, 55, 0.04);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(212, 175, 55, 0.1);
          "
        >
          <span
            style="font-size: 32px; font-weight: 800; color: var(--text-dark)"
            >R$ 4,90</span
          >
        </div>
        <button
          id="btnCheckoutModal"
          class="btn-main"
          style="
            background: var(--text-dark);
            height: 60px;
            font-family: &quot;Inter&quot;, sans-serif;
          "
          onclick="iniciarPagamentoMercadoPago()"
        >
          DESBLOQUEAR AGORA
        </button>
      </div>
    </div>

    <script>
      // 1. INICIALIZA O MERCADO PAGO (COLE SUA PUBLIC KEY AQUI ABAIXO)
      const mp = new MercadoPago(
        "APP_USR-43cbd05f-cdaa-462a-8209-0a3af4cbe41a",
      );

      let sessionIdGlobal = "";
      let intervaloStatus = null;

      function atualizarContador() {
        const numero = Math.floor(Math.random() * 45) + 232;
        const txt = document.getElementById("txt-contador");
        if (txt)
          txt.innerHTML = `<strong>${numero} pessoas</strong> encontrando respostas agora `;
      }
      setInterval(atualizarContador, 6000);
      atualizarContador();

      // GERA A RESPOSTA INICIAL
      async function gerarResposta() {
        const input = document.getElementById("input");
        if (input.value.length < 10)
          return alert("Por favor, conte um pouco mais sobre sua situação.");

        const el = document.getElementById("resultado");
        const btn = document.getElementById("btnGerar");

        btn.disabled = true;
        btn.innerText = "Sintonizando";
        el.innerHTML = `<div class="loading-step">Preparando sua revelação...</div>`;

        sessionIdGlobal = "sess_" + Math.random().toString(36).substring(2, 12);

        try {
          const resposta = await fetch(
            "https://backfind.vercel.app/api/responder",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                mensagem: input.value,
                sessionId: sessionIdGlobal,
              }),
            },
          );

          const data = await resposta.json();
          btn.style.display = "none";
          montarCaixaDeRevelacao(data.texto);
        } catch (err) {
          el.innerHTML = "Erro ao sintonizar. Tente novamente.";
          btn.disabled = false;
          btn.innerText = "Sintonizar Resposta";
        }
      }

      // MONTA O TEXTO BORRADO
      function montarCaixaDeRevelacao(textoVisivel) {
        // SALVA NO NAVEGADOR PARA NÃO SUMIR SE RECARREGAR
        localStorage.setItem("ultima_conversa", textoVisivel);
        localStorage.setItem("ultimo_session_id", sessionIdGlobal);

        const el = document.getElementById("resultado");
        const textoFalso =
          "Esta é a parte final do seu conselho espiritual e prático. As palavras que estão aqui revelarão a sua direção. Não perca a oportunidade de clarear a sua mente.";

        el.innerHTML = `
            <div class="reveal-box">
              <span class="text-visible">${textoVisivel} </span>
              <div class="blur-wrapper">
                <button id="btnReveal" onclick="abrirModalVenda()" style="display: block;">
                    ✨ REVELAR O CONSELHO FINAL
                </button>
                <span id="targetBlur" class="blur-text">${textoFalso}</span>
              </div>
            </div>
        `;
      }

      // ABRE O MODAL LOCAL DE OFERTA
      function abrirModalVenda() {
        document.getElementById("paymentModal").style.display = "flex";
      }

      function fecharModal() {
        document.getElementById("paymentModal").style.display = "none";
      }

      // INTEGRAÇÃO COM MERCADO PAGO MODAL
      async function iniciarPagamentoMercadoPago() {
        const btn = document.getElementById("btnCheckoutModal");
        const textoOriginal = btn.innerText;
        btn.innerText = "Processando acesso...";
        btn.disabled = true;

        try {
          // Busca o ID da preferência no seu backend
          const response = await fetch(
            "https://backfind.vercel.app/api/pagamento",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ sessionId: sessionIdGlobal }),
            },
          );

          const data = await response.json();

          if (data.id) {
            // Abre o checkout na mesma página
            const bricksBuilder = mp.bricks();

            mp.checkout({
              preference: {
                id: data.id,
              },

              render: {
                container: ".modal-content", // Renderiza dentro do seu modal
                label: "Pagar",
              },

              autoOpen: true,
            });

            btn.innerText = "AGUARDANDO PAGAMENTO...";

            // Inicia o rastreamento invisível
            verificarStatus();
          } else {
            throw new Error("ID não retornado pelo backend.");
          }
        } catch (err) {
          console.error("Erro MP:", err);
          alert("Não foi possível gerar o pagamento. Tente novamente.");
          btn.disabled = false;
          btn.innerText = textoOriginal;
        }
      }

      // VERIFICAÇÃO EM TEMPO REAL NO FUNDO
      function verificarStatus() {
        if (intervaloStatus) clearInterval(intervaloStatus);

        intervaloStatus = setInterval(async () => {
          try {
            const res = await fetch(
              `https://backfind.vercel.app/api/status?sessionId=${sessionIdGlobal}`,
            );
            const data = await res.json();

            if (data.pago === true && data.textoRevelado) {
              clearInterval(intervaloStatus); // Para de verificar
              liberarConteudo(data.textoRevelado); // Injeta o texto
            }
          } catch (e) {
            // Apenas continua verificando silenciosamente
          }
        }, 4000); // Checa a cada 4 segundos
      }

      // REVELA O TEXTO FINAL
      function liberarConteudo(textoReal) {
        fecharModal(); // Fecha o modal de vendas, se estiver aberto

        const btn = document.getElementById("btnReveal");
        if (btn) btn.remove(); // Remove o botão de revelar

        const blurArea = document.getElementById("targetBlur");
        if (blurArea) {
          blurArea.innerText = textoReal; // Coloca o texto da IA
          blurArea.classList.add("no-blur"); // Tira o borrão
          blurArea.style.display = "inline";
        }
      }
    </script>
  </body>
</html>
